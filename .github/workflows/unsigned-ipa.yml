name: Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app without signing
        run: |
          xcodebuild \
            -project CodexIOSStarter.xcodeproj \
            -scheme CodexIOSStarter \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/CodexIOSStarter.app build/Payload/
          cd build
          zip -r CodexIOSStarter-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexIOSStarter-unsigned-ipa
          path: build/CodexIOSStarter-unsigned.ipa
          if-no-files-found: error
