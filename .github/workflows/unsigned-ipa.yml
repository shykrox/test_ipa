name: Build VoidLink unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/unsigned-ipa.yml"
      - ".gitmodules"
      - "VoidLink"
      - "VoidLink/**"
  pull_request:
    paths:
      - ".github/workflows/unsigned-ipa.yml"
      - ".gitmodules"
      - "VoidLink"
      - "VoidLink/**"

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: List Xcode project schemes
        run: xcodebuild -list -project VoidLink/VoidLink.xcodeproj

      - name: Clean Xcode derived data and package cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf SourcePackages

      - name: Resolve Swift package dependencies
        run: |
          set -euo pipefail
          mkdir -p SourcePackages
          xcodebuild \
            -resolvePackageDependencies \
            -project VoidLink/VoidLink.xcodeproj \
            -scheme VoidLink \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build VoidLink iOS app without signing
        env:
          ENABLE_USER_SCRIPT_SANDBOXING: NO
        run: |
          set -euo pipefail
          export ENABLE_USER_SCRIPT_SANDBOXING=NO
          xcodebuild \
            -project VoidLink/VoidLink.xcodeproj \
            -scheme VoidLink \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath SourcePackages \
            -UseModernBuildSystem=YES \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            OTHER_CODE_SIGN_FLAGS="--generate-entitlement-der"

      - name: Package unsigned IPA and app
        run: |
          set -euo pipefail
          DERIVED_DATA_ROOT="$HOME/Library/Developer/Xcode/DerivedData"
          APP_PATH="$(find "$DERIVED_DATA_ROOT" -path '*/Build/Products/Release-iphoneos/VoidLink.app' -type d -print -quit 2>/dev/null || true)"

          if [ -z "$APP_PATH" ]; then
            echo "::error::VoidLink.app was not found under $DERIVED_DATA_ROOT"
            exit 1
          fi

          rm -rf build/Payload build/VoidLink-unsigned.ipa build/VoidLink.app.zip
          mkdir -p build/Payload
          ditto "$APP_PATH" build/Payload/VoidLink.app

          (
            cd build
            /usr/bin/zip -qry VoidLink-unsigned.ipa Payload
          )

          (
            cd "$(dirname "$APP_PATH")"
            ditto -c -k --keepParent VoidLink.app "$GITHUB_WORKSPACE/build/VoidLink.app.zip"
          )

      - name: Upload VoidLink artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoidLink-unsigned
          path: |
            build/VoidLink-unsigned.ipa
            build/VoidLink.app.zip
          if-no-files-found: error
