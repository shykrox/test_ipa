name: Build VoidLink unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/unsigned-ipa.yml"
      - ".gitmodules"
      - "VoidLink"
      - "VoidLink/**"
  pull_request:
    paths:
      - ".github/workflows/unsigned-ipa.yml"
      - ".gitmodules"
      - "VoidLink"
      - "VoidLink/**"

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build VoidLink iOS app without signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project VoidLink/VoidLink.xcodeproj \
            -target VoidLink \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA and app
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/VoidLink.app"
          test -d "$APP_PATH"

          rm -rf build/Payload build/VoidLink-unsigned.ipa build/VoidLink.app.zip
          mkdir -p build/Payload
          ditto "$APP_PATH" build/Payload/VoidLink.app

          (
            cd build
            /usr/bin/zip -qry VoidLink-unsigned.ipa Payload
          )

          (
            cd build/Build/Products/Release-iphoneos
            ditto -c -k --keepParent VoidLink.app "$GITHUB_WORKSPACE/build/VoidLink.app.zip"
          )

      - name: Upload VoidLink artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoidLink-unsigned
          path: |
            build/VoidLink-unsigned.ipa
            build/VoidLink.app.zip
          if-no-files-found: error
